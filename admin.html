<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPHeadline CMS - Admin</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header>
<h1>📰 UPHeadline CMS Admin</h1>
</header>

<div class="container" style="max-width:800px;margin:30px auto;background:#fff;padding:20px;border-radius:10px;">

<h2>नई खबर प्रकाशित करें</h2>

<input type="text" id="title" placeholder="News Title">

<textarea id="description" placeholder="News Description" rows="6"></textarea>

<input type="text" id="image" placeholder="Image URL">

<select id="category">
<option value="UP News">UP News</option>
<option value="India">India</option>
<option value="World">World</option>
<option value="Sports">Sports</option>
<option value="Business">Business</option>
<option value="Technology">Technology</option>
</select>

<button onclick="publishNews()">Publish News</button>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
