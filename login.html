<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPHeadline Admin Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box{
    width:350px;
    margin:80px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.login-box h2{
    text-align:center;
    color:#c00000;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#c00000;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Admin Login</h2>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
